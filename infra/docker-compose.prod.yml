services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TRUST_PROXY: "1"
    depends_on:
      - mongo

  web:
    build:
      context: ../apps/web
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
